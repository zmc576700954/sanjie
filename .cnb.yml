# =============================================================
# .cnb.yml — Three Realms (Sanjie) CI/CD Pipeline
# =============================================================
# 触发条件：所有 push 和 PR 事件
# 架构：多阶段流水线，支持并行执行
# =============================================================

# ---------- 全局环境变量 ----------
.env: &global-env
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: /cnb/.pip-cache
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

# ---------- 全局缓存配置 ----------
.env_cache: &pip-cache
  key: pip-${PYTHON_VERSION}-${hash("pyproject.toml")}
  paths:
    - /cnb/.pip-cache
    - /cnb/.venv

# =============================================================
# Stages 定义
# =============================================================
stages:
  - name: setup
    desc: "环境初始化与依赖安装"
  - name: quality
    desc: "代码质量检查（Lint + Type Check）"
  - name: test
    desc: "单元测试与覆盖率"
  - name: build
    desc: "构建打包"
  - name: deploy
    desc: "部署（仅 main 分支）"

# =============================================================
# Stage 1: Setup — 安装依赖、缓存优化
# =============================================================
setup:
  stage: setup
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  cache:
    <<: *pip-cache
  script:
    - pip install --upgrade pip setuptools wheel
    - pip install -e ".[dev]"
    - pip install ruff mypy pytest-cov
    - echo "Dependencies installed successfully"

# =============================================================
# Stage 2: Quality — 并行执行 Lint 和 Type Check
# =============================================================
lint:
  stage: quality
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  cache:
    <<: *pip-cache
  needs: [setup]
  script:
    - pip install -e ".[dev]" ruff
    - ruff check . --output-format=text
    - ruff format --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request"

type-check:
  stage: quality
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  cache:
    <<: *pip-cache
  needs: [setup]
  script:
    - pip install -e ".[dev]" mypy
    - mypy agents/ skills/ mcp-servers/ tools/ --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request"

# =============================================================
# Stage 3: Test — 单元测试 + 覆盖率报告
# =============================================================
unit-tests:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  cache:
    <<: *pip-cache
  needs: [lint]
  script:
    - pip install -e ".[dev]" pytest-cov
    - >
      pytest tests/
      --tb=short
      --strict-markers
      --junitxml=test-results.xml
      --cov=skills
      --cov=mcp-servers
      --cov=agents
      --cov-report=term-missing
      --cov-report=xml:coverage.xml
      --cov-report=html:htmlcov
      --cov-fail-under=70
  artifacts:
    paths:
      - test-results.xml
      - coverage.xml
      - htmlcov/
    reports:
      junit: test-results.xml
      coverage: coverage.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request"

# =============================================================
# Stage 4: Build — 构建 Python 包
# =============================================================
build-package:
  stage: build
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  needs: [unit-tests]
  script:
    - pip install build
    - python -m build --sdist --wheel
    - ls -la dist/
    - echo "Package built: $(ls dist/*.whl 2>/dev/null || ls dist/*.tar.gz)"
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      branch:
        - main
        - develop
    - if: $CI_PIPELINE_SOURCE == "merge_request"

# =============================================================
# Stage 5: Deploy — 发布到制品库（仅 main 分支）
# =============================================================
publish:
  stage: deploy
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
    TWINE_USERNAME: $ARTIFACTORY_USER
    TWINE_PASSWORD: $ARTIFACTORY_PASSWORD
    TWINE_REPOSITORY_URL: $ARTIFACTORY_URL
  needs: [build-package]
  script:
    - pip install twine
    - twine upload dist/*.whl dist/*.tar.gz --non-interactive
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      branch: main

# =============================================================
# 附加 Job: 文档构建（可选）
# =============================================================
build-docs:
  stage: build
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  needs: [unit-tests]
  script:
    - pip install sphinx sphinx-rtd-theme
    - sphinx-quickstart -p "Three Realms" -a "zmc576700954" --no-separate-source --no-separate-build docs/_build 2>/dev/null || true
    - sphinx-build docs docs/_build/html -b html 2>/dev/null || echo "Sphinx build skipped (no conf.py)"
  artifacts:
    paths:
      - docs/_build/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      branch: main

# =============================================================
# 附加 Job: 安全扫描（可选）
# =============================================================
security-scan:
  stage: quality
  image: python:${PYTHON_VERSION}-slim
  env:
    <<: *global-env
  needs: [setup]
  script:
    - pip install safety bandit
    - safety check --full-report 2>/dev/null || echo "Safety check completed with warnings"
    - bandit -r skills/ mcp-servers/ agents/ -f json -o bandit-report.json 2>/dev/null || echo "Bandit scan completed"
    - bandit -r skills/ mcp-servers/ agents/ -f txt 2>/dev/null || true
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 7 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      branch: main

# =============================================================
# Pipeline 整体配置
# =============================================================
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request"
    - if: $CI_PIPELINE_SOURCE == "web"
