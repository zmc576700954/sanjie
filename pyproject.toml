[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sanjie"
version = "1.0.0"
description = "A decentralized AI-Native Agent Cluster based on Model Context Protocol (MCP)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [
    { name = "zmc576700954" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = ["mcp", "pydantic"]

[project.urls]
Homepage = "https://github.com/zmc576700954/sanjie"